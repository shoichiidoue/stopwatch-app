<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ストップウォッチ & タイマー</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>⏱️ Time Master</h1>

        <div class="tabs">
            <button class="tab-btn active" data-tab="stopwatch">ストップウォッチ</button>
            <button class="tab-btn" data-tab="timer">タイマー</button>
        </div>

        <!-- ストップウォッチ -->
        <div id="stopwatch" class="tab-content active">
            <div class="display">
                <span id="hours">00</span>:<span id="minutes">00</span>:<span id="seconds">00</span>.<span id="milliseconds">00</span>
            </div>
            <div class="buttons">
                <button id="startBtn" class="btn btn-primary">▶ スタート</button>
                <button id="stopBtn" class="btn btn-danger" disabled>⏹ ストップ</button>
                <button id="resetBtn" class="btn btn-secondary">🔄 リセット</button>
            </div>
            <div class="laps">
                <h2>📋 ラップタイム</h2>
                <ul id="lapList"></ul>
            </div>
        </div>

        <!-- タイマー -->
        <div id="timer" class="tab-content">
            <div class="timer-input">
                <div class="input-group">
                    <label>時間</label>
                    <input type="number" id="timerHours" min="0" max="23" value="0">
                </div>
                <div class="input-group">
                    <label>分</label>
                    <input type="number" id="timerMinutes" min="0" max="59" value="1">
                </div>
                <div class="input-group">
                    <label>秒</label>
                    <input type="number" id="timerSeconds" min="0" max="59" value="0">
                </div>
            </div>
            <div class="display">
                <span id="timerHoursDisplay">00</span>:<span id="timerMinutesDisplay">01</span>:<span id="timerSecondsDisplay">00</span>
            </div>
            <div class="buttons">
                <button id="timerStartBtn" class="btn btn-primary">▶ スタート</button>
                <button id="timerStopBtn" class="btn btn-danger" disabled>⏹ ストップ</button>
                <button id="timerResetBtn" class="btn btn-secondary">🔄 リセット</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
