<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ストップウォッチ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>ストップウォッチ</h1>
        <div class="display">
            <span id="hours">00</span>:<span id="minutes">00</span>:<span id="seconds">00</span>.<span id="milliseconds">00</span>
        </div>
        <div class="buttons">
            <button id="startBtn" class="btn btn-start">スタート</button>
            <button id="stopBtn" class="btn btn-stop" disabled>ストップ</button>
            <button id="resetBtn" class="btn btn-reset">リセット</button>
        </div>
        <div class="laps">
            <h2>ラップタイム</h2>
            <ul id="lapList"></ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
