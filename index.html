<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ストップウォッチ & タイマー</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="hand-gesture-left">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="30" cy="30" r="8" fill="currentColor"/>
                    <circle cx="30" cy="50" r="8" fill="currentColor"/>
                    <circle cx="30" cy="70" r="8" fill="currentColor"/>
                    <circle cx="50" cy="20" r="8" fill="currentColor"/>
                    <circle cx="50" cy="80" r="8" fill="currentColor"/>
                    <path d="M30 30 L30 50 L30 70 M50 20 L50 80 M30 50 L50 20 L50 80" stroke="currentColor" stroke-width="2" fill="none"/>
                </svg>
            </div>
            <h1>🖐️ Time Master 🖐️</h1>
            <div class="hand-gesture-right">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="70" cy="30" r="8" fill="currentColor"/>
                    <circle cx="70" cy="50" r="8" fill="currentColor"/>
                    <circle cx="70" cy="70" r="8" fill="currentColor"/>
                    <circle cx="50" cy="20" r="8" fill="currentColor"/>
                    <circle cx="50" cy="80" r="8" fill="currentColor"/>
                    <path d="M70 30 L70 50 L70 70 M50 20 L50 80 M70 50 L50 20 L50 80" stroke="currentColor" stroke-width="2" fill="none"/>
                </svg>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="stopwatch">
                <svg class="tab-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" fill="none"/>
                    <path d="M12 7 V12 L15 15" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
                </svg>
                ストップウォッチ
            </button>
            <button class="tab-btn" data-tab="timer">
                <svg class="tab-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M6 2h12M9 4h6M4 6h16v12c0 2-2 4-4 4H8c-2 0-4-2-4-4V6Z" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
                    <circle cx="12" cy="14" r="5" stroke="currentColor" stroke-width="2" fill="none"/>
                </svg>
                タイマー
            </button>
        </div>

        <!-- ストップウォッチ -->
        <div id="stopwatch" class="tab-content active">
            <div class="display">
                <span id="hours">00</span>:<span id="minutes">00</span>:<span id="seconds">00</span>.<span id="milliseconds">00</span>
            </div>
            <div class="buttons">
                <button id="startBtn" class="btn btn-primary">
                    <svg class="hand-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <path d="M30 70 L30 30 M40 70 L40 20 M50 70 L50 15 M60 70 L60 20 M70 70 L70 30 M20 70 Q50 75 80 70" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round"/>
                    </svg>
                    スタート
                </button>
                <button id="stopBtn" class="btn btn-danger" disabled>
                    <svg class="hand-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="35" stroke="currentColor" stroke-width="4" fill="none"/>
                        <line x1="50" y1="20" x2="50" y2="80" stroke="currentColor" stroke-width="4"/>
                        <line x1="20" y1="50" x2="80" y2="50" stroke="currentColor" stroke-width="4"/>
                    </svg>
                    ストップ
                </button>
                <button id="resetBtn" class="btn btn-secondary">
                    <svg class="hand-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <path d="M50 20 Q80 20 80 50 Q80 80 50 80 Q30 80 20 65" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round"/>
                        <path d="M35 50 L50 35 L50 50" fill="currentColor"/>
                    </svg>
                    リセット
                </button>
            </div>
            <div class="laps">
                <div class="laps-header">
                    <svg class="section-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 30 L30 40 L50 20 M70 50 L80 40 L100 60" stroke="currentColor" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="20" cy="70" r="12" stroke="currentColor" stroke-width="3" fill="none"/>
                        <circle cx="80" cy="70" r="12" stroke="currentColor" stroke-width="3" fill="none"/>
                    </svg>
                    <h2>📋 ラップタイム</h2>
                    <svg class="section-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 50 L30 40 L50 60 M70 30 L80 40 L100 20" stroke="currentColor" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="20" cy="70" r="12" stroke="currentColor" stroke-width="3" fill="none"/>
                        <circle cx="80" cy="70" r="12" stroke="currentColor" stroke-width="3" fill="none"/>
                    </svg>
                </div>
                <ul id="lapList"></ul>
            </div>
        </div>

        <!-- タイマー -->
        <div id="timer" class="tab-content">
            <div class="timer-input">
                <div class="input-group">
                    <svg class="input-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" fill="none"/>
                        <path d="M12 6v6M12 12h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <label>時間</label>
                    <input type="number" id="timerHours" min="0" max="23" value="0">
                </div>
                <div class="input-group">
                    <svg class="input-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" fill="none"/>
                        <path d="M12 8v4M12 12h3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <label>分</label>
                    <input type="number" id="timerMinutes" min="0" max="59" value="1">
                </div>
                <div class="input-group">
                    <svg class="input-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" fill="none"/>
                        <path d="M12 10v2M12 12h2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <label>秒</label>
                    <input type="number" id="timerSeconds" min="0" max="59" value="0">
                </div>
            </div>
            <div class="display">
                <span id="timerHoursDisplay">00</span>:<span id="timerMinutesDisplay">01</span>:<span id="timerSecondsDisplay">00</span>
            </div>
            <div class="buttons">
                <button id="timerStartBtn" class="btn btn-primary">
                    <svg class="hand-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <path d="M30 70 L30 30 M40 70 L40 20 M50 70 L50 15 M60 70 L60 20 M70 70 L70 30 M20 70 Q50 75 80 70" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round"/>
                    </svg>
                    スタート
                </button>
                <button id="timerStopBtn" class="btn btn-danger" disabled>
                    <svg class="hand-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="35" stroke="currentColor" stroke-width="4" fill="none"/>
                        <line x1="50" y1="20" x2="50" y2="80" stroke="currentColor" stroke-width="4"/>
                        <line x1="20" y1="50" x2="80" y2="50" stroke="currentColor" stroke-width="4"/>
                    </svg>
                    ストップ
                </button>
                <button id="timerResetBtn" class="btn btn-secondary">
                    <svg class="hand-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <path d="M50 20 Q80 20 80 50 Q80 80 50 80 Q30 80 20 65" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round"/>
                        <path d="M35 50 L50 35 L50 50" fill="currentColor"/>
                    </svg>
                    リセット
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
