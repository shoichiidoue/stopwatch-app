<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ストップウォッチ & タイマー</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>⏱️ Time Master</h1>

        <div class="tabs">
            <button class="tab-btn active" data-tab="stopwatch">ストップウォッチ</button>
            <button class="tab-btn" data-tab="timer">タイマー</button>
        </div>

        <!-- ストップウォッチ -->
        <div id="stopwatch" class="tab-content active">
            <div class="display">
                <span id="hours">00</span>:<span id="minutes">00</span>:<span id="seconds">00</span>.<span id="milliseconds">00</span>
            </div>
            <div class="buttons">
                <button id="startBtn" class="btn btn-primary">
                    <svg class="hand-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <path d="M30 70 L30 30 M40 70 L40 20 M50 70 L50 15 M60 70 L60 20 M70 70 L70 30 M20 70 Q50 75 80 70" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round"/>
                    </svg>
                    スタート
                </button>
                <button id="stopBtn" class="btn btn-danger" disabled>
                    <svg class="hand-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="35" stroke="currentColor" stroke-width="4" fill="none"/>
                        <line x1="50" y1="20" x2="50" y2="80" stroke="currentColor" stroke-width="4"/>
                        <line x1="20" y1="50" x2="80" y2="50" stroke="currentColor" stroke-width="4"/>
                    </svg>
                    ストップ
                </button>
                <button id="resetBtn" class="btn btn-secondary">
                    <svg class="hand-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <path d="M50 20 Q80 20 80 50 Q80 80 50 80 Q30 80 20 65" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round"/>
                        <path d="M35 50 L50 35 L50 50" fill="currentColor"/>
                    </svg>
                    リセット
                </button>
            </div>
            <div class="laps">
                <h2>📋 ラップタイム</h2>
                <ul id="lapList"></ul>
            </div>
        </div>

        <!-- タイマー -->
        <div id="timer" class="tab-content">
            <div class="timer-input">
                <div class="input-group">
                    <label>時間</label>
                    <input type="number" id="timerHours" min="0" max="23" value="0">
                </div>
                <div class="input-group">
                    <label>分</label>
                    <input type="number" id="timerMinutes" min="0" max="59" value="1">
                </div>
                <div class="input-group">
                    <label>秒</label>
                    <input type="number" id="timerSeconds" min="0" max="59" value="0">
                </div>
            </div>
            <div class="display">
                <span id="timerHoursDisplay">00</span>:<span id="timerMinutesDisplay">01</span>:<span id="timerSecondsDisplay">00</span>
            </div>
            <div class="buttons">
                <button id="timerStartBtn" class="btn btn-primary">
                    <svg class="hand-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <path d="M30 70 L30 30 M40 70 L40 20 M50 70 L50 15 M60 70 L60 20 M70 70 L70 30 M20 70 Q50 75 80 70" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round"/>
                    </svg>
                    スタート
                </button>
                <button id="timerStopBtn" class="btn btn-danger" disabled>
                    <svg class="hand-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="35" stroke="currentColor" stroke-width="4" fill="none"/>
                        <line x1="50" y1="20" x2="50" y2="80" stroke="currentColor" stroke-width="4"/>
                        <line x1="20" y1="50" x2="80" y2="50" stroke="currentColor" stroke-width="4"/>
                    </svg>
                    ストップ
                </button>
                <button id="timerResetBtn" class="btn btn-secondary">
                    <svg class="hand-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <path d="M50 20 Q80 20 80 50 Q80 80 50 80 Q30 80 20 65" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round"/>
                        <path d="M35 50 L50 35 L50 50" fill="currentColor"/>
                    </svg>
                    リセット
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
